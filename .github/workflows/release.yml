name: Build and Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk ToDoApp-latest.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToDoApp-APK
          path: ToDoApp-latest.apk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: ToDoApp-APK

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ToDoApp-latest.apk
          tag_name: latest
          name: Latest Build
          body: |
            This is an automated build of the latest version of the ToDo App.
            Download the APK below to install it on your Android device.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
